# PhishTrack Full Stack Docker Compose Configuration
services:
  db:
    image: postgres:15-alpine
    container_name: phishtrack-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-phishtrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phishtrack}
      POSTGRES_DB: ${POSTGRES_DB:-phishtrack}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-phishtrack}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - phishtrack-network

  redis:
    image: redis:7-alpine
    container_name: phishtrack-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - phishtrack-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: abusechecker-backend
    container_name: phishtrack-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://phishtrack:${POSTGRES_PASSWORD:-phishtrack}@db:5432/phishtrack
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND_URL=redis://redis:6379/0
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-abuse@phishtrack.local}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-PhishTrack Abuse Reporting}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - GRAPH_ENABLED=${GRAPH_ENABLED:-false}
      - GRAPH_TENANT_ID=${GRAPH_TENANT_ID:-}
      - GRAPH_CLIENT_ID=${GRAPH_CLIENT_ID:-}
      - GRAPH_CLIENT_SECRET=${GRAPH_CLIENT_SECRET:-}
      - GRAPH_FROM_EMAIL=${GRAPH_FROM_EMAIL:-}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-change-this-secret-key-in-production}
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - CORS_ORIGINS=["http://localhost:3000","http://127.0.0.1:3000","http://frontend:3000"]
      - DEFAULT_MONITOR_INTERVAL=${DEFAULT_MONITOR_INTERVAL:-21600}
      - XARF_REPORTER_ORG=${XARF_REPORTER_ORG:-PhishTrack}
      - XARF_REPORTER_CONTACT=${XARF_REPORTER_CONTACT:-abuse@yourdomain.com}
      - XARF_STORAGE_PATH=${XARF_STORAGE_PATH:-./xarf_reports}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - xarf_reports:/app/xarf_reports
      - ./backend/migrations:/app/migrations
    networks:
      - phishtrack-network

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: abusechecker-backend
    container_name: phishtrack-celery-worker
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=postgresql+asyncpg://phishtrack:${POSTGRES_PASSWORD:-phishtrack}@db:5432/phishtrack
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND_URL=redis://redis:6379/0
    depends_on:
      - db:
        condition: service_both_healthy
      - redis:
        condition: service_healthy
    volumes:
      - xarf_reports:/app/xarf_reports

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      image: abusechecker-backend
      container_name: phishtrack-celery-beat
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://phishtrack:${POSTGRES_PASSWORD:-phishtrack}@db:5432/phishtrack
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND_URL=redis://redis://celery:6379/0
      - depends_on:
      - redis:
        condition: service_healthy

  flower:
    build:
      context: ./backend
      dockerfile: dockerfile
      image: abusechecker-backend
      container_name: phishtrack-flower
    command: celery -A app.tasks.celery_app --broker=redis://redis:6379/0 flower --port=5555
    environment:
      - CELERY_BROKER_URL=redis://celery:6379/0
      - FLOWER_PORT=${FLOWER_PORT:-5557}
    ports:
      - "5557:5555"
    depends_on:
      - redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      image: abusechecker-frontend
      container_name: phishtrack-frontend
      restart: unless-stopped
      environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
      - NODE_ENV=production
      depends_on:
      - backend:
        condition: service_healthy
    networks:
      - phishtrack-network

volumes:
  postgres_data:
  xarf_reports:
    redis_data:
networks:
  phishtrack-network:
    driver: bridge
