# RANTAS Docker Compose Configuration for Private Registry
# Version: 1.0
#
# This file pulls pre-built images from a private registry instead of building locally.
# Use this for Portainer deployment or when you don't want to build images on the deployment server.
#
# IMPORTANT - Architecture Support:
# This compose file uses pre-built images from your private registry.
# Build them using: ./scripts/build-ghcr.sh (then push to your registry)
#
# The images are built for:
#   - linux/amd64 (x86_64/AMD64 servers)
#
# Prerequisites:
# 1. Build images locally: ./scripts/build-ghcr.sh
# 2. Push to your registry: docker tag && docker push
# 3. Optionally set IMAGE_VERSION (defaults to 'latest')
# 4. Set REGISTRY_HOST environment variable to your registry (e.g., ghcr.io/your-org)
# 5. Run: docker compose -f docker-compose.ghcr.yml up
#
# Image naming: ${REGISTRY_HOST}/rantas-{backend,frontend}:${IMAGE_VERSION}
# For example:
#   ghcr.io/your-org/rantas-backend:latest
#   ghcr.io/your-org/rantas-frontend:latest
#
# PORTAINER DEPLOYMENT:
# =====================
# To deploy via Portainer:
#
# Option A - Use pre-built images (RECOMMENDED):
# 1. Push images to your registry
# 2. In Portainer, create a new stack or update existing
# 3. Upload this docker-compose.ghcr.yml file
# 4. Add environment variable: REGISTRY_HOST=ghcr.io/your-org
# 5. Add environment variable if needed: IMAGE_VERSION=latest
# 6. Deploy the stack
#
# Option B - Build on deployment server:
# If you prefer building directly on the server, use docker-compose.yml instead
# and enable "Rebuild" when updating the stack in Portainer.
#
# TROUBLESHOOTING:
# If you see "exec format error" errors, you may be deploying to a non-AMD64 server.
# These images are built for linux/amd64 only.
# To add ARM64 support, modify PLATFORMS in scripts/build-ghcr.sh

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: phishtrack-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-phishtrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phishtrack}
      POSTGRES_DB: ${POSTGRES_DB:-phishtrack}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No port mapping needed - internal only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-phishtrack}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - phishtrack-network
    deploy:
      resources:
        limits:
          cpus: '${DB_CPU_LIMIT:-1.0}'
          memory: ${DB_MEM_LIMIT:-512M}
        reservations:
          cpus: '${DB_CPU_RESERVATION:-0.25}'
          memory: ${DB_MEM_RESERVATION:-128M}

  # Redis (for Celery broker and result backend)
  redis:
    image: redis:7-alpine
    container_name: phishtrack-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    # No port mapping needed - internal only
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - phishtrack-network
    deploy:
      resources:
        limits:
          cpus: '${REDIS_CPU_LIMIT:-0.5}'
          memory: ${REDIS_MEM_LIMIT:-256M}
        reservations:
          cpus: '${REDIS_CPU_RESERVATION:-0.1}'
          memory: ${REDIS_MEM_RESERVATION:-64M}

  # FastAPI Backend
  backend:
    image: ${REGISTRY_HOST:-ghcr.io/your-org}/rantas-backend:${IMAGE_VERSION:-latest}
    container_name: phishtrack-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-phishtrack}:${POSTGRES_PASSWORD:-phishtrack}@db:5432/${POSTGRES_DB:-phishtrack}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # SMTP Settings (fallback if Graph API fails or is not enabled)
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-abuse@phishtrack.local}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-PhishTrack Abuse Reporting}
      # Microsoft Graph API (for Microsoft 365 email)
      - GRAPH_ENABLED=${GRAPH_ENABLED:-false}
      - GRAPH_TENANT_ID=${GRAPH_TENANT_ID:-}
      - GRAPH_CLIENT_ID=${GRAPH_CLIENT_ID:-}
      - GRAPH_CLIENT_SECRET=${GRAPH_CLIENT_SECRET:-}
      - GRAPH_FROM_EMAIL=${GRAPH_FROM_EMAIL:-}
      # Security
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-change-this-secret-in-production}
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      # CORS
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://frontend:3000}
      # Application
      - DEBUG=${DEBUG:-false}
      # Monitoring
      - DEFAULT_MONITOR_INTERVAL=${DEFAULT_MONITOR_INTERVAL:-21600}
      # Browserless Screenshot Service
      - BROWSERLESS_API_KEY=${BROWSERLESS_API_KEY:-}
      - BROWSERLESS_ENDPOINT=${BROWSERLESS_ENDPOINT:-https://connected.browserless.io}
      - BROWSERLESS_VIEWPORT_WIDTH=${BROWSERLESS_VIEWPORT_WIDTH:-1440}
      - BROWSERLESS_VIEWPORT_HEIGHT=${BROWSERLESS_VIEWPORT_HEIGHT:-900}
      # XARF Configuration
      - XARF_REPORTER_ORG=${XARF_REPORTER_ORG:-PhishTrack}
      - XARF_REPORTER_CONTACT=${XARF_REPORTER_CONTACT:-abuse@yourdomain.com}
      - XARF_REPORTER_DOMAIN=${XARF_REPORTER_DOMAIN:-yourdomain.com}
      - XARF_STORAGE_PATH=${XARF_STORAGE_PATH:-./xarf_reports}
      # Microsoft Teams Webhook
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL:-}
    ports:
      - "${BACKEND_PORT:-9000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8000/health', timeout=5).raise_for_status()\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    volumes:
      - xarf_reports:/app/xarf_reports
    networks:
      - phishtrack-network
    deploy:
      resources:
        limits:
          cpus: '${BACKEND_CPU_LIMIT:-1.0}'
          memory: ${BACKEND_MEM_LIMIT:-1G}
        reservations:
          cpus: '${BACKEND_CPU_RESERVATION:-0.25}'
          memory: ${BACKEND_MEM_RESERVATION:-256M}

  # Celery Worker
  celery-worker:
    image: ${REGISTRY_HOST:-ghcr.io/your-org}/rantas-backend:${IMAGE_VERSION:-latest}
    container_name: phishtrack-celery-worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-2}
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-phishtrack}:${POSTGRES_PASSWORD:-phishtrack}@db:5432/${POSTGRES_DB:-phishtrack}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # SMTP Settings
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-abuse@phishtrack.local}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-PhishTrack Abuse Reporting}
      # Microsoft Graph API
      - GRAPH_ENABLED=${GRAPH_ENABLED:-false}
      - GRAPH_TENANT_ID=${GRAPH_TENANT_ID:-}
      - GRAPH_CLIENT_ID=${GRAPH_CLIENT_ID:-}
      - GRAPH_CLIENT_SECRET=${GRAPH_CLIENT_SECRET:-}
      - GRAPH_FROM_EMAIL=${GRAPH_FROM_EMAIL:-}
      # Browserless
      - BROWSERLESS_API_KEY=${BROWSERLESS_API_KEY:-}
      - BROWSERLESS_ENDPOINT=${BROWSERLESS_ENDPOINT:-https://connected.browserless.io}
      - BROWSERLESS_VIEWPORT_WIDTH=${BROWSERLESS_VIEWPORT_WIDTH:-1440}
      - BROWSERLESS_VIEWPORT_HEIGHT=${BROWSERLESS_VIEWPORT_HEIGHT:-900}
      # XARF Configuration
      - XARF_REPORTER_ORG=${XARF_REPORTER_ORG:-PhishTrack}
      - XARF_REPORTER_CONTACT=${XARF_REPORTER_CONTACT:-abuse@yourdomain.com}
      - XARF_REPORTER_DOMAIN=${XARF_REPORTER_DOMAIN:-yourdomain.com}
      - XARF_STORAGE_PATH=${XARF_STORAGE_PATH:-./xarf_reports}
      # Microsoft Teams Webhook
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - xarf_reports:/app/xarf_reports
    networks:
      - phishtrack-network
    deploy:
      resources:
        limits:
          cpus: '${CELERY_CPU_LIMIT:-1.0}'
          memory: ${CELERY_MEM_LIMIT:-512M}
        reservations:
          cpus: '${CELERY_CPU_RESERVATION:-0.25}'
          memory: ${CELERY_MEM_RESERVATION:-128M}

  # Celery Beat (for scheduled tasks)
  celery-beat:
    image: ${REGISTRY_HOST:-ghcr.io/your-org}/rantas-backend:${IMAGE_VERSION:-latest}
    container_name: phishtrack-celery-beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-phishtrack}:${POSTGRES_PASSWORD:-phishtrack}@db:5432/${POSTGRES_DB:-phishtrack}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - phishtrack-network
    deploy:
      resources:
        limits:
          cpus: '${BEAT_CPU_LIMIT:-0.5}'
          memory: ${BEAT_MEM_LIMIT:-256M}
        reservations:
          cpus: '${BEAT_CPU_RESERVATION:-0.1}'
          memory: ${BEAT_MEM_RESERVATION:-64M}

  # Flower (Celery monitoring UI)
  flower:
    image: ${REGISTRY_HOST:-ghcr.io/your-org}/rantas-backend:${IMAGE_VERSION:-latest}
    container_name: phishtrack-flower
    restart: unless-stopped
    command: celery -A app.tasks.celery_app --broker=redis://redis:6379/0 flower --port=5555
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:5555', timeout=5).raise_for_status()\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - FLOWER_PORT=${FLOWER_PORT:-5557}
      - FLOWER_BASIC_AUTH=${FLOWER_BASIC_AUTH:-}
    ports:
      - "${FLOWER_PORT:-5557}:5555"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - phishtrack-network
    deploy:
      resources:
        limits:
          cpus: '${FLOWER_CPU_LIMIT:-0.5}'
          memory: ${FLOWER_MEM_LIMIT:-256M}
        reservations:
          cpus: '${FLOWER_CPU_RESERVATION:-0.1}'
          memory: ${FLOWER_MEM_RESERVATION:-64M}

  # Frontend (Next.js)
  frontend:
    image: ${REGISTRY_HOST:-ghcr.io/your-org}/rantas-frontend:${IMAGE_VERSION:-latest}
    container_name: phishtrack-frontend
    restart: unless-stopped
    environment:
      # NOTE: NEXT_PUBLIC_API_URL is baked into the JS bundle at build time via --build-arg
      # Setting it here as a runtime env var has NO EFFECT in Next.js standalone mode.
      # To change the API URL, rebuild the frontend image with:
      #   --build-arg NEXT_PUBLIC_API_URL=https://your-api.com/api
      - NODE_ENV=${NODE_ENV:-production}
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    depends_on:
      - backend
    networks:
      - phishtrack-network
    deploy:
      resources:
        limits:
          cpus: '${FRONTEND_CPU_LIMIT:-0.5}'
          memory: ${FRONTEND_MEM_LIMIT:-512M}
        reservations:
          cpus: '${FRONTEND_CPU_RESERVATION:-0.1}'
          memory: ${FRONTEND_MEM_RESERVATION:-128M}

# Named volumes for data persistence
volumes:
  postgres_data:
    driver: local
    name: phishtrack_postgres_data
  redis_data:
    driver: local
    name: phishtrack_redis_data
  xarf_reports:
    driver: local
    name: phishtrack_xarf_reports

# Networks configuration
networks:
  phishtrack-network:
    driver: bridge
    name: phishtrack-network
    # Uncomment below to use an external network (e.g., for reverse proxy)
    # external: true
