# Alembic Configuration for PhishTrack

[alembic]
# Path to migration scripts
script_location = migrations

# Template for migration file generation
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Prepend sys.path with the current app directory
prepend_sys_path = .

# Timezone for revision timestamps
timezone = UTC

# Max characters for auto-truncation in revision file names
truncate_slug_length = 40

# Set to 'true' to run migrations in "offline" mode
# This generates SQL scripts instead of running against a live database
# offline_mode = false

# Set to true if running in an async environment
# async driver handling is set in env.py
# async_mode = true

[post_write_hooks]
# Uncomment to enable Black formatting after migration generation
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -q

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
